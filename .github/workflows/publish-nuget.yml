name: Publish NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test Keycloak.sln -c Release

      - name: Pack
        run: dotnet pack Keycloak/Keycloak.csproj -c Release -o ./artifacts

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          # NuGet profile username of whoever CREATED the trusted publishing policy.
          # This is not the GitHub username and not necessarily the package owner org.
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        id: nuget_push
        shell: bash
        run: |
          set -o pipefail
          output=$(dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate 2>&1) || exit_code=$?

          echo "$output"

          if echo "$output" | grep -qiE "already exists|409|Conflict"; then
            echo "package_pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${exit_code:-0}" -ne 0 ]; then
            exit "${exit_code}"
          fi

          echo "package_pushed=true" >> "$GITHUB_OUTPUT"

      - name: Push symbols
        if: steps.nuget_push.outputs.package_pushed == 'true'
        run: dotnet nuget push ./artifacts/*.snupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
